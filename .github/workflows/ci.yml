name: Deploy docker hub

on:
  push:
    branches-ignore:
      - 'gh-pages'

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

env:
  BASE_URL_STORYBOOK: https://ditmar.github.io/leetcode-spa
jobs:
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '>=20.3.0'
          cache: 'yarn'

      - name: Install specific Yarn version
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run lint
        run: yarn lint

      - name: Run test
        run: yarn test

  build-storybook:
    name: Build and Deploy Storybook
    runs-on: ubuntu-latest
    needs: quality-checks
    outputs:
      SANITIZED_BRANCH_NAME: ${{ steps.sanitize_branch_name.outputs.SANITIZED_BRANCH_NAME }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '>=20.3.0'
          cache: 'yarn'

      - name: Install specific Yarn version
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Sanitize Branch name
        id: sanitize_branch_name
        run: |
          if [[ "${{ github.ref_name }}" == "master" ]]; then
            echo "SANITIZED_BRANCH_NAME=" >> "$GITHUB_OUTPUT"
            echo "STORYBOOK_BASE=/leetcode-spa/" >> "$GITHUB_OUTPUT"
          else
            SANITIZED=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9-]/-/g')
            echo "SANITIZED_BRANCH_NAME=${SANITIZED}" >> "$GITHUB_OUTPUT"
            echo "STORYBOOK_BASE=/leetcode-spa/${SANITIZED}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Storybook
        run: yarn build-storybook
        env:
          STORYBOOK_BASE_URL: ${{ steps.sanitize_branch_name.outputs.STORYBOOK_BASE }}

      - name: Debug - Check build output
        run: |
          echo "Branch name: ${{ github.ref_name }}"
          echo "Sanitized branch name: ${{ steps.sanitize_branch_name.outputs.SANITIZED_BRANCH_NAME }}"
          echo "Storybook base: ${{ steps.sanitize_branch_name.outputs.STORYBOOK_BASE }}"
          echo "Contents of storybook-static:"
          ls -la ./storybook-static/

      - name: Deploy Storybook (master → root)
        if: github.ref_name == 'master'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./storybook-static
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          keep_files: true
          enable_jekyll: false
          allow_empty_commit: false
          force_orphan: false

      - name: Deploy Storybook (branch → subdirectory)
        if: github.ref_name != 'master'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./storybook-static
          destination_dir: ${{ steps.sanitize_branch_name.outputs.SANITIZED_BRANCH_NAME }}
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          keep_files: true
          enable_jekyll: false
          allow_empty_commit: false
          force_orphan: false

      - name: Show Storybook URL
        run: |
          echo "Storybook is available at ${{ env.BASE_URL_STORYBOOK }}/${{ steps.sanitize_branch_name.outputs.SANITIZED_BRANCH_NAME }}"
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: quality-checks
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '>=20.3.0'
          cache: 'yarn'

      - name: Install specific Yarn version
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
      - name: Release stable version (master)
        if: github.ref_name == 'master'
        run: yarn release --ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release candidate version (feature branch)
        if: github.ref_name != 'master'
        run: yarn release:rc --ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  build-and-push-docker-image:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: build-storybook
    outputs:
      VERSION: ${{ steps.set_outputs.outputs.VERSION }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '>=22.22.2 <=22.22.2'
          cache: 'yarn'

      - name: Install specific Yarn version
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build project
        run: yarn build

      - name: Login to DockerHub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup environment variables
        run: |
          echo "DOCKER_HUB_REPO=leetcode-spa" >> $GITHUB_ENV
          echo "DOCKERHUB_USERNAME=ditmar" >> $GITHUB_ENV

      - name: Get short commit hash
        id: get_commit_hash
        run: echo "VERSION=$(node -p -e "require('./package.json').version")" >> $GITHUB_ENV

      - name: Build Docker image
        run: docker build --build-arg WEB_APP=${{ env.VERSION }} -t ${{ env.DOCKERHUB_USERNAME }}/${{ env.DOCKER_HUB_REPO }}:${{ env.VERSION }} .

      - name: Push Docker image to Docker Hub
        run: docker push ${{ env.DOCKERHUB_USERNAME }}/${{ env.DOCKER_HUB_REPO }}:${{ env.VERSION }}

      - name: Clean up
        run: docker image prune -a -f

      - id: set_outputs
        run: echo "VERSION=${{ env.VERSION }}" >> $GITHUB_OUTPUT
